{% extends "base.html" %}
{% block title %}Đăng ký tài khoản{% endblock %}
{% block content %}
<h1 class="mb-4">Đăng Ký Tài Khoản Mới</h1>
<form method="post" class="form-group">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Đăng Ký</button>
</form>
<p>Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập</a></p>
{% endblock %}
