{% extends "base.html" %}
{% block content %}
<a href="{% url 'create_repair' %}" class="btn btn-success mb-3">Create Repair Request</a>

<table class="table table-bordered">
    <tr>
        <th>Code</th>
        <th>Name</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    {% for machine in machines %}
    <tr>
        <td>{{ machine.machine_code }}</td>
        <td>{{ machine.machine_name }}</td>
        <td>{{ machine.status }}</td>
        <td>
            <a href="{% url 'machine_detail' machine.id %}" class="btn btn-info btn-sm">
                View
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
