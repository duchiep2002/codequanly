{% extends "base.html" %}
{% block content %}

<h3>{{ machine.machine_name }}</h3>
<p><strong>Status:</strong> {{ machine.status }}</p>

<h5>Repair History</h5>
<ul>
    {% for r in repairs %}
        <li>{{ r.description }} - {{ r.status }}</li>
    {% empty %}
        <li>No repairs yet.</li>
    {% endfor %}
</ul>

<a href="/" class="btn btn-secondary">Back</a>

{% endblock %}
