{% extends "base.html" %}
{% block title %}Cập nhật trạng thái {{ machine.name }}{% endblock %}
{% block content %}
<h2 class="mb-4">Cập nhật trạng thái máy: {{ machine.name }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Cập nhật</button>
</form>
{% endblock %}
