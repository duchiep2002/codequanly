<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách máy</title>
</head>
<body>
    <h1>Danh sách máy móc</h1>
    {% if machines %}
        <ul>
        {% for machine in machines %}
            <li>
                <a href="{% url 'machine_detail' machine.pk %}">{{ machine.name|default:"Máy " }}{{ machine.pk }}</a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>Chưa có máy nào trong hệ thống.</p>
    {% endif %}
    <a href="/">Quay về trang chủ</a>
</body>
</html>
